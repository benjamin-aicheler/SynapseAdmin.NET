services:
  synapseadmin:
    image: ghcr.io/benjamin-aicheler/synapseadmin.net:latest
    container_name: synapseadmin
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
    volumes:
      - ./logs:/app/logs
      - ./keys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
