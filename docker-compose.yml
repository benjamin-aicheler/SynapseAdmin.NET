services:
  synapseadmin:
    image: ghcr.io/benjamin-aicheler/synapseadmin.net:latest
    container_name: synapseadmin
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      # IMPORTANT: Change this to a secure, unique passphrase in production!
      # It is used for encrypting session tokens on disk.
      - DP_PASSPHRASE=your-secure-passphrase-here
    volumes:
      - ./logs:/app/logs
      - ./keys:/app/keys
    restart: unless-stopped
