services:
  web:
    build:
      context: .
      dockerfile: src/SynapseAdmin/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
    volumes:
      - ./logs:/app/logs
      - ./keys:/root/.aspnet/DataProtection-Keys
